<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="時鐘看板">
<title>Message Clock</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    
    <div class="header-section">
        <div class="clock">
            <div class="flip-card" id="hour-card">
                <div class="top"></div>
                <div class="number" id="hour">20</div>
                <div class="bottom"></div>
            </div>
            
            <div class="colon">:</div>
            
            <div class="flip-card" id="minute-card">
                <div class="top"></div>
                <div class="number" id="minute">03</div>
                <div class="bottom"></div>
            </div>
        </div>

        <div class="date" id="date">載入中...</div>
    </div>

    <div class="widget-section">
        
        <div class="left-col">
            <div class="card weather-card">
                <div id="weather" class="weather-main">☀️ 广州 --°C</div>
                <div class="weather-sub">💧 湿度 --% &nbsp;&nbsp; 🍃 AQI -- 优</div>
            </div>
        </div>

        <div class="right-col">
            <div class="card message">
                <div class="card-title">📝 留言板</div>
                <div class="card-content" id="message">等待留言載入...</div>
            </div>
        </div>

    </div>

</div>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
