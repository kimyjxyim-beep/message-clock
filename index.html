<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="時鐘看板">
<title>Message Clock</title>
<link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles/style.css?v=jinzhu-clock26">
</head>
<body>

<div class="container">
    
    <div class="header-section">
        <div class="clock">
            <div class="flip-card" id="hour-card">
                <div class="card-half top"><div class="num" id="hour-top-num">20</div></div>
                <div class="card-half bottom"><div class="num" id="hour-bottom-num">20</div></div>
                <div class="leaf front" id="hour-front"><div class="num" id="hour-front-num">20</div></div>
                <div class="leaf back" id="hour-back"><div class="num" id="hour-back-num">20</div></div>
                <div class="hinge"></div>
            </div>

            <div class="colon">:</div>

            <div class="flip-card" id="minute-card">
                <div class="card-half top"><div class="num" id="minute-top-num">03</div></div>
                <div class="card-half bottom"><div class="num" id="minute-bottom-num">03</div></div>
                <div class="leaf front" id="minute-front"><div class="num" id="minute-front-num">03</div></div>
                <div class="leaf back" id="minute-back"><div class="num" id="minute-back-num">03</div></div>
                <div class="hinge"></div>
                <button id="jinzhu-clock-invite" class="jinzhu-clock-invite" type="button" aria-label="叫金主來時鐘" title="叫金主來時鐘">🐾</button>
            </div>
        </div>

        <div class="date" id="date">載入中...</div>
    </div>

    <div class="widget-section">
        
        <div class="left-col">
            <div class="card weather-card">
                <div id="weather" class="weather-main">☀️ 广州 --°C</div>
                <div class="weather-sub">💧 湿度 --% &nbsp;&nbsp; 🍃 AQI -- 优</div>
            </div>
        </div>

        <div class="jinzhu-home idle" id="jinzhu-home">
            <div class="jinzhu-walker" id="jinzhu-walker">
                <div class="jinzhu-bubble" id="jinzhu-bubble" role="status" aria-live="polite">
                    <span id="jinzhu-bubble-text">我唔系宠物，我系金主。</span>
                </div>
                <button class="jinzhu-cat" id="jinzhu-cat" type="button" aria-label="同金主互动">
                    <img id="jinzhu-image" src="assets/jinzhu/idle-1.png" alt="金主，一隻白色貓貓" width="108" height="108">
                </button>
                <div class="jinzhu-panel" id="jinzhu-panel" aria-label="和金主互动" hidden>
                    <div class="jinzhu-stats" aria-hidden="true">
                        <span>心情 <b id="jinzhu-mood">72</b></span>
                        <span>能量 <b id="jinzhu-energy">68</b></span>
                        <span>饱腹 <b id="jinzhu-fullness">76</b></span>
                        <span>親密 <b id="jinzhu-bond">40</b></span>
                    </div>
                    <div class="jinzhu-actions">
                        <button type="button" data-jinzhu-action="pet"><span aria-hidden="true">♡</span>摸摸</button>
                        <button type="button" data-jinzhu-action="feed"><span aria-hidden="true">♨</span>餵食</button>
                        <button type="button" data-jinzhu-action="care"><span aria-hidden="true">◷</span>提醒</button>
                    </div>
                    <div id="jinzhu-world-controls"></div>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="card message">
                <div class="card-title">📝 留言板</div>
                <div class="card-content" id="message">等待留言載入...</div>
            </div>
        </div>

    </div>

</div>

    <script src="scripts/config.js?v=jinzhu-clock26"></script>
    <script src="scripts/storage-adapter.js?v=jinzhu-clock26"></script>
    <script src="scripts/jinzhu-routine.js?v=jinzhu-clock26"></script>
    <script src="scripts/jinzhu-world.js?v=jinzhu-clock26"></script>
    <script src="scripts/app.js?v=jinzhu-clock26"></script>

</body>
</html>
